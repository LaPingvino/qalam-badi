# Qalam Badi — proportional spacing system
#
# Every measurement here is expressed in NUQTA, the calligrapher's dot. This is
# not decoration: the inherited monospace master already draws the Arabic nuqta
# at 271x289 units and the Latin period at 270x310 — one dot module, shared
# across scripts. Grounding the spacing in it is what lets Latin, Cyrillic,
# Greek and Arabic share a single rhythm rather than four unrelated ones.
#
# The classical Persian system measures letters in dots stacked along the pen's
# edge; Mishkin-Qalam's hand is described the same way. We keep the stroke
# monolinear (pen = 141 units, invariant — that is the Courier inheritance we
# are deliberately preserving) and move only the WIDTHS. All the calligraphic
# character therefore has to come from proportion and rhythm.
#
# Values are multiples of one nuqta. 0.25 nuqta ~= 68 units.

module:
  # Measured from the seed master; asserted at build time so a change upstream
  # cannot silently shift the whole system.
  nuqta: 271
  pen: 141

defaults:
  lsb: 0.30
  rsb: 0.30

# Corner rounding (scripts/soften-corners.py). Courier's corners are perfectly
# square because a typewriter face is drawn as engineering; a reed pen carries a
# small radius into every junction it makes. This is the one move that pushes
# the inherited outlines toward a written hand without costing us anything we
# are keeping — a fillet changes no stroke width anywhere — and it applies to
# every script at once, so Latin serifs and Arabic tooth junctions soften on the
# same radius and stay siblings.
softening:
  radius: 48        # ~0.18 nuqta, ~34% of the 141-unit pen. Bolder than a
                    # restrained text face would use, on purpose: the brief is a
                    # written hand, not a tidied typewriter, and at 26 the
                    # softening was legible only under magnification.
  min_turn: 22      # below this the junction is near-straight; rounding adds points and nothing else
  max_turn: 155     # above this it is a spike (the apex of A, W, v) — a pen keeps those sharp too

categories:

  # --- Latin / Cyrillic / Greek ------------------------------------------
  # Courier's serifs are wide because they had a cell to fill. We keep them —
  # they are the seed style — so the sidebearings stay modest: the serif is
  # already doing most of the spacing work. Round letters tuck in slightly,
  # the way they do in any serif text face.

  latin_round:      { lsb: 0.22, rsb: 0.22 }   # o c e d b p q g s O C G Q S
  latin_straight:   { lsb: 0.28, rsb: 0.28 }   # i l m n h u r I H M N U
  latin_diagonal:   { lsb: 0.20, rsb: 0.20 }   # v w x y A V W X Y K k z Z
  latin_default:    { lsb: 0.26, rsb: 0.26 }
  uppercase:        { lsb: 0.26, rsb: 0.26 }

  punctuation:      { lsb: 0.34, rsb: 0.34 }
  quotes:           { lsb: 0.30, rsb: 0.30 }
  brackets:         { lsb: 0.30, rsb: 0.22 }
  math:             { lsb: 0.45, rsb: 0.45 }
  currency:         { lsb: 0.30, rsb: 0.30 }
  digits:           { lsb: 0.30, rsb: 0.30 }   # kept equal to each other (tabular)

  # --- Arabic -------------------------------------------------------------
  # A joining edge is not a sidebearing: the connector must land exactly on the
  # advance edge or the letters come apart. Those sides are pinned to 0 and the
  # value below applies only to the FREE side of the letter.
  #
  # Arabic sits tighter than Latin. In a nastaliq hand the letters of a word are
  # nearly touching and the space between words carries the rhythm instead —
  # that contrast between tight word and open gap is a large part of why the
  # script looks the way it does, and it survives the loss of stroke contrast.

  arabic_free:      { lsb: 0.14, rsb: 0.14 }
  arabic_isolated:  { lsb: 0.18, rsb: 0.18 }
  arabic_alef:      { lsb: 0.34, rsb: 0.34 }   # alef is a lone stroke; it needs air
  arabic_dotgroup:  { lsb: 0.14, rsb: 0.14 }

  # Final forms sweep. In this hand a final tail runs 1.5-1.7 alef-heights wide
  # and returns rightward UNDERNEATH the letters before it — the opposite of a
  # naskh final's tight deep hook. A negative sidebearing is how that is spelled
  # in a font: the ink is allowed past the advance so the tail tucks under its
  # neighbour instead of shoving the line apart.
  #
  # This is the seen/sheen trick from Courier Badi, generalised. There it was a
  # workaround for a cell that was too small; here there is no cell, so it stops
  # being a hack and becomes the actual device the script is built on.
  arabic_final:     { lsb: -0.55, rsb: 0.14 }

# Word space and friends, in nuqta. The Arabic word gap is deliberately wider
# than the Latin one, per the tight-word/open-gap rhythm noted above.
spaces:
  space:       1.90    # ~0.25 em, the usual word space for a serif text face
  nbspace:     1.90
  arabic_space: 2.25
  thinspace:   0.65
  hairspace:   0.35
  emspace:     7.55   # = 1 em at upm 2048
  enspace:     3.78
  figurespace: null   # follows the digit advance, resolved at build time

# Ink widths, in nuqta, for the glyphs the monospace cell distorted.
#
# scripts/classify-widths.py finds these: letters whose body is a single stem
# but whose ink fills the cell, because their serifs were stretched to the
# walls. In the seed master every letter from `J` to `w` lands between 770 and
# 1112 units of ink — a range of 1.4x across the whole alphabet, where a serif
# text face runs about 3x from `i` to `m`. That flatness IS the typewriter look,
# and it is the one Courier inheritance we are giving up: everything else about
# the letters stays.
#
# scripts/narrow-serifs.py compresses the flanks either side of the stem to hit
# these, leaving stem width — and therefore monolinearity — untouched.
#
# Letters not listed keep the ink they inherited. Most of the alphabet was
# always about the right width; only the single-stem letters were badly served.
ink_targets:
  # One stem, nothing else. Ink = stem + two serif arms.
  dotlessi:   1.25
  i:          1.25
  l:          1.25
  I:          1.30
  uni0237:    1.25   # dotless j
  j:          1.25
  one:        1.45

  # One stem plus a small reaching part.
  f:          1.85
  t:          1.85
  r:          1.70
  J:          1.90

  # One stem plus arms. These stay noticeably narrow of the round letters,
  # which is what makes a serif face read as proportional at all.
  E:          2.55
  L:          2.55
  F:          2.55
  P:          2.75
  T:          2.90
  Y:          2.90
  seven:      2.70

# Deliberately NOT narrowed: s, S, z, Z, B and the round letters. The flank
# compression anchors on the stem, and these have no stem at mid-height — the
# detector locks onto a curve instead and squeezes the letter lopsidedly. They
# were only ~10% over anyway, which is inside the range a serif face tolerates.
# If they ever need narrowing it should be a redraw, not a remap.

# Per-glyph overrides. Use sparingly and always say why — this file is the
# design record, not just configuration.
overrides:
  # The alef is the vertical the whole Arabic line is measured against. Its ink
  # is only 141 units (one pen) wide, so pure ink-fitting would leave it almost
  # touching its neighbours.
  uni0627:  { lsb: 0.40, rsb: 0.40 }

  # Latin i/j/l keep Courier's full-width serifs on purpose. Fitting them by ink
  # alone leaves them nearly as wide as m, which reads as a spacing bug rather
  # than a style. They are narrowed here at the SERIF, not the sidebearing —
  # see scripts/make-proportional.py --trim-serifs.

# Arabic vertical proportion (scripts/shorten-ascenders.py).
#
# The alef is 3 nuqta in nastaliq and 5-6 in naskh; Mishkin-Qalam's own Greatest
# Name measures 3.5. The seed's alef is 1252 units — 4.6 nuqta — so the
# inherited proportion is naskh, and relative to the hand we are after the
# verticals are too tall and everything horizontal too small.
#
# Bringing the alef down resets the measure the whole script is read against:
# teeth, dal and bowls are all expressed as fractions of it, so the bowls and
# finals become large relative to the verticals. That low, wide, swinging
# silhouette is most of what makes nastaliq recognisable.
#
# y is remapped piecewise — identity through the body, compressed only above it
# — so horizontal strokes keep their thickness and the face stays monolinear.
verticals:
  alef:     3.6    # nuqta. Between nastaliq's 3 and the inherited 4.6, landing
                   # just above Mishkin-Qalam's measured 3.5.
  body_top: 1.45   # nuqta. Below this nothing moves: teeth, bowls, connectors
                   # and every horizontal stroke keep their exact geometry.

# Arabic connector runs (scripts/fit-connectors.py).
#
# The cell stretched the baseline connectors sideways exactly as it stretched
# the Latin serifs, and the fix is the same family of transform: hold every
# part of the glyph that is LETTER rigid, and change the length only of the
# bare connector runs between and around those parts. "Letter" is decided by
# the font's own join signature: at any x where the only ink is the join-height
# stroke, the pen is travelling, not writing. Each written stretch — tooth,
# bowl, hook, dot — is an island, and islands only ever translate. The first
# version of this transform held one island rigid and scaled the rest; on a
# seen final that scaled the TEETH from ~290 units wide to 24, which is what
# finally forced the multi-island model.
#
# The transform is symmetric. Without a width target a glyph only has its
# outer approaches compressed to `approach`. With a target (below), whatever
# the capped geometry still misses of the classical width is inserted into —
# or removed from — a single elongation run, the bare run beside the letter's
# largest island, which is where a kashida classically lives. It is never
# spread across the teeth gaps.
connectors:
  approach:  0.42   # nuqta of flat lead-in kept between a join and the letter
  keep_long: []     # glyphs whose plateau is a deliberate kashida, not a stretch

  # Classical ink widths, in nuqta, per skeleton family and joining form.
  # A family key covers every letter sharing that skeleton (teh and theh are
  # beh with dots; sheen, sad and dad ride on seen). Only letters whose
  # written form INCLUDES a flat run belong here — this is the beh short form
  # at four to five dots and the seen carried on its kashida at seven to
  # eleven; we enter near the low end of both ranges because this is a text
  # face, not a display swash. Teeth, dal and the bowls have no flat run to
  # fit and are deliberately absent: their width problems, where they exist,
  # are body drawing problems, and this transform must not touch bodies.
  widths:
    beh.fina:  4.5
    beh.isol:  4.5
    seen.fina: 7.5
    seen.isol: 7.5
    # Lam runs thin: it is a vertical stroke, and the word that shows it off
    # is Allah — composed from lam.init + lam.medi, so these two widths ARE
    # the ligature's rhythm. Shrinkage spreads over both approaches, keeping
    # the stem centred between its joins.
    lam.init:  1.15
    lam.medi:  2.0

# Mark strokes (scripts/narrow-madda.py). The madda kept its 944-unit cell
# width while the alef under it came down from 5.45 to 3.6 nuqta, so the
# proportion drifted top-heavy without the mark ever moving. It is a
# horizontal stroke, so narrowing it in x is free, per the connector
# corollary. 2.75 nuqta lands it just over half the alef height — narrower
# read as timid against the sweep of this hand, wider reads as the cell.
marks:
  madda: 2.75

# Dots below the letter (scripts/tuck-dots.py). The seed parks below-dots low
# enough to clear the deepest tail that could occur anywhere in the monospace
# cell, leaving ~250 units of dead air under the letter — and pushing final
# yeh's dots to y=-1024, 190 units past the declared -838 descender, where
# any renderer that clips to line metrics cuts them off. (Reported as "ya
# gets cut off"; the body only reaches -481, it was always the dots.) A hand
# tucks the dots in under the letter, so the fix and the style agree: each
# below-dot group rises as one rigid shape until it clears the descender,
# stopping min_gap short of the ink above it.
dots:
  min_gap: 0.09   # nuqta of air kept between the letter and a tucked dot group

# Tails (scripts/reshape-tails.py). The seed's seen/sheen/sad tail plunges 555
# units below the writing line and travels barely further than it falls — a
# naskh gesture, and a cell-bound one, since a deep narrow hook was the only
# tail that fitted a 1228-unit box.
#
# Mishkin-Qalam's finals do the opposite: measured on his Greatest Name, a final
# runs ~1.5-1.7 alef heights wide against only ~0.9 deep, and the tail returns
# rightward UNDER the preceding letters. Both factors ramp with depth so the
# tail leaves the bowl at its original angle and only diverges as it descends.
tails:
  depth:    0.85
  extend:   2.6
  min_drop: 0.85   # nuqta below the writing line before it counts as a tail

# Transliteration modifier letters (scripts/normalize-modifiers.py).
#
# These are the ayn and hamza of 'Abdu'l-Baha, Huququ'llah and nastaliq — not
# decoration in a Baha'i face. They sit directly beside an apostrophe in running
# text, so a mismatch is conspicuous, and in the seed they mismatched three ways
# at once: 604x680 against the quote's 366x555, sitting 257 units lower, and
# drawn with a ~128 stroke against the 141 pen. Oversized and washed out
# simultaneously.
#
# Each is matched to the glyph it stands next to.
modifiers:
  match:
    uni02BF: quoteright   # ayn
    uni02BE: quoteright   # hamza
