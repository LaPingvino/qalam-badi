name: Build font and specimen

on: push

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Install sys tools/deps
      run: |
        sudo apt-get update
        sudo apt-get install ttfautohint libcairo2-dev python3-cairo-dev pkg-config python3-dev
        sudo snap install yq
    - uses: actions/cache@v4
      with:
        # venv-test holds fontbakery and was NOT cached, so every run
        # reinstalled it from scratch before the QA step could start.
        # .mono-seed.woff2 is the compiled monospace seed used by the specimen;
        # it only changes when upstream Courier Badi is merged.
        path: |
          ./venv/
          ./venv-test/
          ./.mono-seed.woff2
        key: ${{ runner.os }}-venv-${{ hashFiles('**/requirements*.txt') }}-${{ hashFiles('sources/QalamBadi-Mono.ufo/fontinfo.plist') }}
        restore-keys: |
          ${{ runner.os }}-venv-
    - name: gen zip file name
      id: zip-name
      shell: bash
      # Set the archive name to repo name + "-assets" e.g "MavenPro-assets"
      run: echo "ZIP_NAME=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')-fonts" >> $GITHUB_ENV

    # If a new release is cut, use the release tag to auto-bump the source files
    # - name: Bump release
    #   if: github.event_name == 'release'
    #   run: |
    #     . venv/bin/activate
    #     SRCS=$(yq e ".sources[]" sources/config.yaml)
    #     TAG_NAME=${GITHUB_REF/refs\/tags\//}
    #     echo "Bumping $SRCS to $TAG_NAME"
    #     for src in $SRCS
    #     do
    #       bumpfontversion sources/$src --new-version $TAG_NAME;
    #     done

    - name: Build font
      run: make build

    # Publish the specimen the moment the fonts exist, before the QA steps.
    #
    # The only check that catches a visual regression here is a person looking
    # at the result, so how soon the specimen becomes visible is the real
    # constraint on iterating. Waiting for fontbakery, diffenator2 and the bonus
    # contrast build pushed that to the end of a ten-minute run; this puts it at
    # roughly three.
    #
    # keep_files matters: out/ holds only the specimen at this point, and
    # without it this deploy would replace the whole site and take the previous
    # run's reports offline until the final deploy landed.
    - name: Build specimen
      run: make specimen
      continue-on-error: true
    - name: setup site
      run: mkdir -p out && cp scripts/index.html out/index.html
    - name: Deploy specimen early
      uses: peaceiris/actions-gh-pages@v4
      if: ${{ github.ref == 'refs/heads/main' }}
      continue-on-error: true
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        keep_files: true

    - name: Check with fontbakery
      # -j runs the checks across all available cores (see Makefile).
      run: make test
      continue-on-error: true
    - name: proof
      run: make proof
    - name: Build bonus contrast font + specimen
      # The contrast (XOPQ) variable font is a release-only extra with its own
      # family name, explicitly outside the shipping submission. Building it
      # costs 4m10s — 38% of the whole run — because it regenerates eight
      # masters and a second variable font.
      #
      # It is therefore built only for tags and releases, not on every push.
      # On an ordinary push the thing that matters is how the family LOOKS, and
      # the only check that catches a visual regression is a person looking at
      # the specimen, so the push loop is kept as short as possible.
      if: ${{ contains(github.ref, 'refs/tags/') || github.event_name == 'release' }}
      run: |
        make contrast-vf
        . venv/bin/activate
        python3 scripts/make-contrast-specimen.py \
          "fonts-contrast/webfonts/QalamBadi-Contrast[XOPQ,ital,wght].woff2" \
          out/contrast-specimen.html
      continue-on-error: true
    - name: Deploy
      uses: peaceiris/actions-gh-pages@v4
      if: ${{ github.ref == 'refs/heads/main' }}
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./out
        # Merge, so a failure in a later step cannot take the early-deployed
        # specimen back off the site.
        keep_files: true
    - name: Archive artifacts
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ZIP_NAME }}
        path: |
          fonts
          fonts-contrast
          out
    outputs:
      zip_name: ${{ env.ZIP_NAME }}

  # There are two ways a release can be created: either by pushing a tag, or by
  # creating a release from the GitHub UI. Pushing a tag does not automatically
  # create a release, so we have to do that ourselves. However, creating a
  # release from the GitHub UI *does* push a tag, and we don't want to create
  # a new release in that case because one already exists!

  release:
    name: Create and populate release
    needs: build
    runs-on: ubuntu-latest
    if: contains(github.ref, 'refs/tags/')
    env:
      ZIP_NAME: ${{ needs.build.outputs.zip_name }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - name: Download font artefact files
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ZIP_NAME }}
          path: ${{ env.ZIP_NAME }}
      - name: Copy DESCRIPTION.en_us.html to artefact directory
        run: cp documentation/DESCRIPTION.en_us.html ${{ env.ZIP_NAME }}/DESCRIPTION.en_us.html
      - name: Copy ARTICLE.en_us.html to artefact directory
        run: cp documentation/ARTICLE.en_us.html ${{ env.ZIP_NAME }}/ARTICLE.en_us.html
        continue-on-error: true
      - name: Copy OFL.txt to artefact directory
        run: cp OFL.txt ${{ env.ZIP_NAME }}/OFL.txt
      - name: Remove proof/fontbakery stuff from release
        run: rm -rf ${{ env.ZIP_NAME }}/out
      - name: gen release file name
        shell: bash
        run: echo "RELEASE_ZIP_NAME=$(echo '${{ github.repository }}' | awk -F '/' '{print $2}')-${{github.ref_name}}" >> $GITHUB_ENV
      - name: Create release bundle
        run: mv ${{ env.ZIP_NAME }} ${{ env.RELEASE_ZIP_NAME }}; zip -r ${{ env.RELEASE_ZIP_NAME }}.zip ${{ env.RELEASE_ZIP_NAME }}
      - name: Check for release
        id: create_release
        run: |
          if ! gh release view ${{ github.ref_name }}; then
          git show -s --format=%B ${{ github.ref_name }} | tail -n +4 | gh release create ${{ github.ref_name }} -t ${{ github.ref_name }} -F -
          fi
      - name: Populate release
        run: |
          gh release upload ${{ github.ref_name }} ${{ env.RELEASE_ZIP_NAME }}.zip --clobber
      - name: Set release live
        run: |
          gh release edit ${{ github.ref_name }} --draft=false
